<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Healthcare Survey</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg">
<div class="container">

<h1>Healthcare Survey Form</h1>

<form id="surveyForm">

<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="number" id="age" placeholder="Age" required>

<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="text" id="q1" placeholder="Doctor visit frequency">
<input type="text" id="q2" placeholder="Satisfied with provider">
<input type="text" id="q3" placeholder="Waiting time">
<input type="text" id="q4" placeholder="Insurance issues">
<input type="text" id="q5" placeholder="Hygiene rating">
<input type="text" id="q6" placeholder="Staff behavior">
<input type="text" id="q7" placeholder="Medical help ease">
<input type="text" id="q8" placeholder="Medicine affordability">
<input type="text" id="q9" placeholder="Recommend others">
<input type="text" id="q10" placeholder="Suggestions">

<input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5">

<button type="submit">Submit</button>

</form>

</div>

<script src="script.js"></script>
</body>
</html>.js"></script>
<script src="lang.js"></script>
</body>
</html>
