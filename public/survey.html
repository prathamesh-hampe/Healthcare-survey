<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Healthcare Survey</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg">
<div class="container">

<h1>Healthcare Survey Form</h1>

<form id="surveyForm">

<label>Name:</label>
<input type="text" id="name" placeholder="Enter your name" required>

<label>Email:</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label>Age:</label>
<input type="number" id="age" placeholder="Enter your age" required>

<label>Gender:</label>
<select id="gender" required>
  <option value="">Select Gender</option>
  <option>Male</option>
  <option>Female</option>
  <option>Other</option>
</select>

<h3>Healthcare Questions</h3>

<div class="questions">

<label>1. How often do you visit a doctor?</label>
<input type="text" id="q1" required>

<label>2. Are you satisfied with your healthcare provider?</label>
<input type="text" id="q2" required>

<label>3. How long do you usually wait for appointments?</label>
<input type="text" id="q3" required>

<label>4. Did you face any problem regarding health insurance during treatment?</label>
<input type="text" id="q4" required>

<label>5. How do you rate hospital hygiene?</label>
<input type="text" id="q5" required>

<label>6. Are staff polite and professional?</label>
<input type="text" id="q6" required>

<label>7. How easy is it to get medical help?</label>
<input type="text" id="q7" required>

<label>8. Are medications affordable?</label>
<input type="text" id="q8" required>

<label>9. Would you recommend this facility to others?</label>
<input type="text" id="q9" required>

<label>10. Any improvements you’d suggest?</label>
<input type="text" id="q10" required>

</div>

<label>Rate our healthcare services (1-5):</label>
<input type="number" id="rating" min="1" max="5" required>

<button type="submit">Submit Survey</button>

</form>

</div>

<script src="script.js"></script>
</body>
</html>
