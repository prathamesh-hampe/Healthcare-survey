<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg">
<div class="container">

<select onchange="changeLanguage(this.value)">
<option value="en">English</option>
<option value="hi">हिंदी</option>
<option value="mr">मराठी</option>
</select>

<h1 data-lang="userLogin">User Login</h1>

<input type="text" id="username" placeholder="Enter Username" data-lang="username">
<input type="password" id="password" placeholder="Enter Password" data-lang="password">

<button onclick="login('user')">Login</button>
<p><a href="admin-login.html" data-lang="adminLogin">Login as Admin</a></p>

</div>

<script src="script.js"></script>
<script src="lang.js"></script>
</body>
</html>
